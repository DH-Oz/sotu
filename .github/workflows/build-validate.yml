name: Build & Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Build and Validate Orchestrator
        run: PYTHONPATH=. uv run python tools/build.py

      - name: Ensure Determinism and No Untracked Diff
        run: |
          git status
          git diff --exit-code src/sotu/data/
