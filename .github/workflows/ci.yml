name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff Lint and Format Checks
        run: |
          uv run ruff check src tests tools
          uv run ruff format --check src tests tools

      - name: Run Type Checking (mypy)
        run: uv run mypy src tests tools

      - name: Run Test Suite
        run: uv run pytest --cov=src --cov-report=xml

      - name: Assert Version Bump on Data Changes
        if: github.event_name == 'pull_request'
        run: |
          # Check if data files changed relative to target branch
          git fetch origin ${{ github.base_ref }}
          CHANGED_DATA_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "^src/sotu/data/" || true)
          if [ -n "$CHANGED_DATA_FILES" ]; then
            echo "Detected changes in package data files:"
            echo "$CHANGED_DATA_FILES"
            
            # Check if version in pyproject.toml changed
            ORIGINAL_VERSION=$(git show origin/${{ github.base_ref }}:pyproject.toml | grep -E '^version = ' | sed -E 's/version = "(.*)"/\1/')
            CURRENT_VERSION=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
            
            echo "Original version: $ORIGINAL_VERSION"
            echo "Current version: $CURRENT_VERSION"
            
            if [ "$ORIGINAL_VERSION" = "$CURRENT_VERSION" ]; then
              echo "Error: Data files changed under src/sotu/data/ but version in pyproject.toml was not bumped."
              exit 1
            fi
            echo "Version successfully bumped."
          else
            echo "No data changes detected under src/sotu/data/."
          fi
